<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login form</title>
    <link rel="stylesheet" href="style.css">

</head>
<body id="bdy">
    <div id="container">
        <!--LOGIN PAGE START-->

        <div id="main_conatainer">
            <form>
            Name
            <input type="text" placeholder="Enter Your Name" required id="nav_box">
            Mobile No.
            <input type="tel" placeholder="Enter Your No." maxlength="10" required id="nav_box">
            Email Id
            <input type="email" placeholder="Enter Your Email Id" required id="nav_box">
            Password
            <input type="password" placeholder="Enter Your password" maxlength="6" required id="nav_box">
            Gender
            <PRE>
  <input type="radio" name="gender" value="Male"> Male        <input type="radio" name="gender" value="Female"> Female
     
            </PRE>
             <center>
            <input type="reset" name="Clear Form" id="navbox">
            <br><br>
            
            <input type="submit" name="Login" value="Login" id="navBox">
             </center>
        
        </form>
        </div>
<!--LOGIN PAGE END-->

    </div>
</body>
</html>
